	<style>
		:root{
			--accent:#7B6FBE;
			--bg:#ffffff;
			--text:#111827;
			--muted:#6b7280;
		}
		html,body{height:100%;}
		body{
			margin:0;
			font-family:'DM Sans',system-ui,Arial,Helvetica,sans-serif;
			color:var(--text);
			background:var(--bg);
			-webkit-font-smoothing:antialiased;
			-moz-osx-font-smoothing:grayscale;
			line-height:1.45;
			-webkit-tap-highlight-color: transparent;
		}
		/* Nav */
		.nav-wrap{max-width:1100px;margin:28px auto 12px;padding:0 24px;}
		nav{display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;}
		.nav-left,.nav-right{display:flex;gap:20px;align-items:center}
		.nav-center{position:absolute;left:50%;transform:translateX(-50%);}
		.brand{font-family:'DM Sans',sans-serif;font-size:18px;color:var(--muted);font-weight:700;text-decoration:none;cursor:pointer}
        .brand:hover{color:var(--accent)}
		a.nav-link{color:var(--muted);text-decoration:none;font-weight:300}
		a.nav-link:hover{color:var(--accent)}
		hr.sep{border:none;border-top:1px solid #eef0f6;margin-top:18px}

		/* Views */
		.view{display:none;}
		.view.active{display:block;}

		/* Each view has its own container */
		.page-container{max-width:1100px;margin:0 auto;padding:0 24px 80px;}

		/* Home */
		.home-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 0;}
		.home-inner h1{font-family:'DM Sans',serif;font-size:44px;margin:8px 0;color:var(--text)}
		.home-inner p.subtitle{max-width:760px;color:var(--muted);font-size:18px;margin:12px 0 20px}
		.portrait{width:220px;height:220px;border-radius:12px;object-fit:cover;background:#f3f2fa}

		/* Gallery */
		.gallery-inner{padding-top:24px;}
		.gallery-section{margin:0 0 48px 0}
		.section-title{font-family:'DM Sans',serif;text-align:center;color:var(--muted);margin-top:12px}
		.carousel{position:relative}
		.viewport{overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:8px}
		.track{display:flex;gap:16px;padding:6px 6px 6px 0}
		.slide{flex:0 0 30%;aspect-ratio:1/1;height:auto;border-radius:8px;overflow:hidden;scroll-snap-align:start;background:#eee}
		.slide img{width:100%;height:100%;object-fit:cover;display:block}

		/* Arrows */
		.arrow{position:absolute;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:6px 8px;opacity:.9}
		.arrow.left{left:4px}
		.arrow.right{right:4px}
		.arrow:focus{outline:2px solid rgba(123,111,190,.15);border-radius:6px}

		/* Projects */
		.projects-inner{padding-top:36px;min-height:240px;}

		@media(max-width:900px){
			.nav-wrap{margin:18px auto}
			.home-inner h1{font-size:34px}
			.slide{flex:0 0 45%;aspect-ratio:1/1;height:auto}
			.portrait{width:300px;height:300px}
		}
		@media(max-width:520px){
			.nav-left,.nav-right{gap:12px}
			.nav-center{position:static;transform:none;order:0;margin:auto}
			nav{flex-wrap:wrap}
			.slide{flex:0 0 70%;aspect-ratio:1/1;height:auto}
			.home-inner{padding:28px 12px}
			.home-inner h1{font-size:28px}
		}
	</style>
</head>

	<script>
		const views = document.querySelectorAll('.view');
		function showView(id) {
			views.forEach(v => {
				v.classList.toggle('active', v.id === id);
			});
			window.scrollTo(0, 0);
		}
		function route() {
			const h = location.hash.replace('#', '') || 'home';
			showView(h);
		}
		window.addEventListener('hashchange', route);
		document.querySelectorAll('[data-route]').forEach(a => a.addEventListener('click', e => {
			const href = a.getAttribute('href');
			if (href && href.startsWith('#')) { e.preventDefault(); location.hash = href; }
		}));
		route();

		document.querySelectorAll('[data-carousel]').forEach(carousel => {
			const viewport = carousel.querySelector('.viewport');
			const prev = carousel.querySelector('[data-prev]');
			const next = carousel.querySelector('[data-next]');
			const slide = carousel.querySelector('.slide');
			function scrollByAmount(dir = 1) {
				const w = slide.getBoundingClientRect().width + 16;
				viewport.scrollBy({ left: w * 1.6 * dir, behavior: 'smooth' });
			}
			prev.addEventListener('click', () => scrollByAmount(-1));
			next.addEventListener('click', () => scrollByAmount(1));
			viewport.addEventListener('keydown', e => {
				if (e.key === 'ArrowLeft') scrollByAmount(-1);
				if (e.key === 'ArrowRight') scrollByAmount(1);
			});
		});

		if (!location.hash) location.hash = '#home';
	</script>
